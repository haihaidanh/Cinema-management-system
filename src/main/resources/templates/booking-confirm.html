<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Xác Nhận Đặt Vé - Cinema System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-[#f4faff] text-[#111d23]">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="pt-24 p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="bg-[#004692] text-white p-6 text-center">
            <h1 class="text-2xl font-black font-headline">XÁC NHẬN ĐƠN HÀNG</h1>
            <p class="text-blue-200 mt-1">Vui lòng kiểm tra lại thông tin trước khi thanh toán</p>
        </div>
        
        <div class="p-8">
            <div class="flex gap-6 mb-8 pb-8 border-b">
                <img th:src="${showtime.movie.posterUrl != null ? showtime.movie.posterUrl : 'https://via.placeholder.com/120x180?text=No+Poster'}" class="w-24 h-36 object-cover rounded-lg shadow-sm">
                <div>
                    <h2 class="text-2xl font-black font-headline text-[#004692] mb-2" th:text="${showtime.movie.title}">Movie Title</h2>
                    <p class="text-slate-600 mb-1 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">calendar_today</span>
                        <span th:text="${#temporals.format(showtime.showDate, 'dd/MM/yyyy')}">Date</span>
                    </p>
                    <p class="text-slate-600 mb-1 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        <span th:text="${#temporals.format(showtime.showTime, 'HH:mm')}">Time</span>
                    </p>
                    <p class="text-slate-600 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">meeting_room</span>
                        <span th:text="${showtime.room.roomName}">Room</span>
                    </p>
                </div>
            </div>

            <h3 class="text-lg font-bold font-headline mb-4">Chi tiết vé</h3>
            <div class="bg-slate-50 rounded-xl border border-slate-200 mb-8 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 border-b border-slate-200">
                        <tr>
                            <th class="p-3 font-bold text-slate-600">Ghế</th>
                            <th class="p-3 font-bold text-slate-600">Loại ghế</th>
                            <th class="p-3 font-bold text-slate-600 text-right">Giá gốc</th>
                            <th class="p-3 font-bold text-slate-600 text-right">Phụ thu</th>
                            <th class="p-3 font-bold text-slate-600 text-right">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sa : ${selectedSeats}" class="border-b border-slate-100 last:border-0">
                            <td class="p-3 font-bold" th:text="${sa.seat.seatRow + sa.seat.seatNumber}">A1</td>
                            <td class="p-3">
                                <span th:if="${sa.seat.seatType != null and sa.seat.seatType.typeName == 'VIP'}" class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-xs font-bold">VIP</span>
                                <span th:if="${sa.seat.seatType != null and sa.seat.seatType.typeName == 'Couple'}" class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full text-xs font-bold">Couple</span>
                                <span th:if="${sa.seat.seatType == null or sa.seat.seatType.typeName == 'Thường'}" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-bold">Thường</span>
                            </td>
                            <td class="p-3 text-right text-slate-500" th:text="${#numbers.formatDecimal(showtime.basePrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">100,000đ</td>
                            <td class="p-3 text-right" th:text="${sa.seat.seatType != null and sa.seat.seatType.surcharge > 0 ? '+' + #numbers.formatDecimal(sa.seat.seatType.surcharge, 0, 'COMMA', 0, 'POINT') + 'đ' : '-'}">-</td>
                            <td class="p-3 text-right font-bold text-[#004692]" th:text="${#numbers.formatDecimal(showtime.basePrice + (sa.seat.seatType != null ? sa.seat.seatType.surcharge : 0), 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">120,000 VNĐ</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-between items-center bg-blue-50 p-6 rounded-xl border border-blue-100 mb-8">
                <span class="text-xl font-bold text-[#004692]">Tổng thanh toán:</span>
                <span class="text-3xl font-black text-[#004692]" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</span>
            </div>

            <div class="flex gap-4">
                <a th:href="@{/showtimes/{id}/seats(id=${showtime.showtimeId})}" class="flex-1 text-center bg-white border-2 border-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-50 transition">
                    Quay lại chọn ghế
                </a>
                <form action="/bookings/checkout" method="POST" class="flex-1">
                    <input type="hidden" name="showtimeId" th:value="${showtime.showtimeId}">
                    <input type="hidden" name="seatIds" th:value="${seatIdsStr}">
                    <button type="submit" class="w-full text-center bg-[#004692] text-white py-3 border-2 border-[#004692] rounded-xl font-bold hover:bg-blue-800 transition">
                        Xác nhận thanh toán
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
