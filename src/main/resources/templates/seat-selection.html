<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chọn Ghế - Cinema System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .seat {
            width: 42px; height: 42px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        /* Ghế Thường */
        .seat.AVAILABLE.type-normal { background-color: #e0f2fe; border: 2px solid #7dd3fc; color: #0369a1; }
        .seat.AVAILABLE.type-normal:hover { border-color: #004692; background-color: #bae6fd; }
        /* Ghế VIP */
        .seat.AVAILABLE.type-vip { background-color: #fef3c7; border: 2px solid #fbbf24; color: #92400e; }
        .seat.AVAILABLE.type-vip:hover { border-color: #d97706; background-color: #fde68a; }
        /* Ghế Couple */
        .seat.AVAILABLE.type-couple { background-color: #fce7f3; border: 2px solid #f472b6; color: #9d174d; }
        .seat.AVAILABLE.type-couple:hover { border-color: #db2777; background-color: #fbcfe8; }
        /* Ghế đang chọn */
        .seat.SELECTED { background-color: #004692; border: 2px solid #004692; color: white; }
        /* Ghế đã đặt */
        .seat.BOOKED { background-color: #cbd5e1; border: 2px solid #cbd5e1; color: white; cursor: not-allowed; }

        .seat-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .screen { height: 60px; background: linear-gradient(to bottom, #e2e8f0, transparent); border-top: 4px solid #94a3b8; border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
    </style>
</head>

<body class="bg-[#f4faff] text-[#111d23]">

<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="pt-24 p-8 pb-32">
    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">
        <!-- Seat Map -->
        <div class="w-full lg:w-2/3 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <a th:href="@{/movies/{id}/showtimes(id=${showtime.movie.movieId})}" class="inline-flex items-center gap-2 text-slate-500 hover:text-[#004692] mb-6 font-bold transition">
                <span class="material-symbols-outlined text-sm">arrow_back_ios</span> Quay lại chọn ngày chiếu
            </a>
            
            <div class="text-center mb-8">
                <h2 class="text-xl font-bold font-headline mb-2" th:text="${showtime.room.roomName}">Room</h2>
                <div class="screen mb-8 relative">
                    <span class="absolute bottom-2 left-1/2 -translate-x-1/2 text-slate-400 font-bold tracking-widest text-sm">MÀN HÌNH</span>
                </div>
            </div>

            <!-- Generate Seat Map via JS for easier grouping by row -->
            <div id="seat-map" class="overflow-x-auto pb-4">
                <!-- Seats will be injected here -->
            </div>

            <!-- Chú thích loại ghế + phụ thu -->
            <div class="mt-8 border-t pt-6">
                <h4 class="font-bold text-sm text-slate-600 mb-3">BẢNG CHÚ THÍCH LOẠI GHẾ</h4>
                <div class="flex flex-wrap gap-6">
                    <div th:each="st : ${seatTypes}" class="flex items-center gap-2">
                        <div th:classappend="${st.typeName == 'VIP' ? 'type-vip' : (st.typeName == 'Couple' ? 'type-couple' : 'type-normal')}"
                             class="seat AVAILABLE w-8 h-8 text-[10px]">
                        </div>
                        <div>
                            <span class="text-sm font-bold" th:text="${st.typeName}">Type</span>
                            <span class="text-xs text-slate-500 ml-1"
                                  th:text="${st.surcharge > 0 ? '(+' + #numbers.formatDecimal(st.surcharge, 0, 'COMMA', 0, 'POINT') + ' VNĐ)' : '(Không phụ thu)'}">
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="seat SELECTED w-8 h-8"></div>
                        <span class="text-sm font-bold">Đang chọn</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="seat BOOKED w-8 h-8"></div>
                        <span class="text-sm font-bold">Đã đặt</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="w-full lg:w-1/3">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 sticky top-24">
                <h3 class="text-xl font-black font-headline text-[#004692] mb-4">THÔNG TIN ĐẶT VÉ</h3>

                <div class="flex gap-4 mb-4 pb-4 border-b">
                    <img th:src="${showtime.movie.posterUrl != null ? showtime.movie.posterUrl : 'https://via.placeholder.com/60x90?text=No+Poster'}" class="w-16 h-24 object-cover rounded">
                    <div>
                        <h4 class="font-bold text-lg mb-1" th:text="${showtime.movie.title}">Movie</h4>
                        <p class="text-sm text-slate-500 mb-1" th:text="${#temporals.format(showtime.showDate, 'dd/MM/yyyy')} + ' | ' + ${#temporals.format(showtime.showTime, 'HH:mm')}">Date & Time</p>
                        <p class="text-sm text-slate-500" th:text="${showtime.room.roomName}">Room</p>
                    </div>
                </div>

                <!-- Chi tiết ghế đã chọn -->
                <div class="mb-4">
                    <div class="flex justify-between text-slate-600 mb-2">
                        <span>Ghế chọn:</span>
                        <span id="selected-seats-display" class="font-bold text-black">-</span>
                    </div>
                    <div id="seat-detail-list" class="space-y-1 mb-3">
                        <!-- Danh sách chi tiết từng ghế sẽ được JS inject -->
                    </div>
                    <div class="flex justify-between text-slate-600">
                        <span>Giá vé cơ bản:</span>
                        <span th:text="${#numbers.formatDecimal(showtime.basePrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</span>
                    </div>
                </div>

                <div class="pt-4 border-t mb-6">
                    <div class="flex justify-between items-end">
                        <span class="text-lg font-bold">Tổng tiền:</span>
                        <span id="total-price-display" class="text-2xl font-black text-[#004692]">0 VNĐ</span>
                    </div>
                </div>

                <form action="/bookings/confirm" method="POST">
                    <input type="hidden" name="showtimeId" th:value="${showtime.showtimeId}">
                    <input type="hidden" name="seatIds" id="seat-ids-input" value="">
                    <button type="submit" id="continue-btn" disabled
                            class="w-full bg-[#004692] text-white py-3 rounded-xl font-bold hover:bg-blue-800 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Tiếp tục
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const seatsData = /*[[${seats}]]*/ [];
    const basePrice = /*[[${showtime.basePrice}]]*/ 0;

    // Hàm xác định class CSS theo loại ghế
    function getSeatTypeClass(seatTypeName) {
        if (!seatTypeName) return 'type-normal';
        const name = seatTypeName.toLowerCase();
        if (name.includes('vip')) return 'type-vip';
        if (name.includes('couple') || name.includes('sweetbox')) return 'type-couple';
        return 'type-normal';
    }

    // Group seats by row
    const seatsByRow = {};
    seatsData.forEach(sa => {
        const row = sa.seat.seatRow;
        if (!seatsByRow[row]) seatsByRow[row] = [];
        seatsByRow[row].push(sa);
    });

    // Sort rows alphabetically
    const sortedRows = Object.keys(seatsByRow).sort();

    const seatMapContainer = document.getElementById('seat-map');

    // Render seat map
    sortedRows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'seat-row';

        const rowLabel = document.createElement('div');
        rowLabel.className = 'w-8 h-10 flex items-center justify-center font-bold text-slate-400 mr-2';
        rowLabel.innerText = row;
        rowDiv.appendChild(rowLabel);

        // Sort seats in row by seatNumber
        seatsByRow[row].sort((a, b) => a.seat.seatNumber - b.seat.seatNumber).forEach(sa => {
            const seatDiv = document.createElement('div');
            const typeName = sa.seat.seatType ? sa.seat.seatType.typeName : 'Thường';
            const typeClass = getSeatTypeClass(typeName);

            seatDiv.className = `seat ${sa.status} ${sa.status === 'AVAILABLE' ? typeClass : ''}`;
            seatDiv.innerText = sa.seat.seatNumber;
            seatDiv.dataset.id = sa.id;
            seatDiv.dataset.surcharge = sa.seat.seatType ? sa.seat.seatType.surcharge : 0;
            seatDiv.dataset.label = row + sa.seat.seatNumber;
            seatDiv.dataset.typeName = typeName;
            seatDiv.dataset.typeClass = typeClass;
            seatDiv.title = `${row}${sa.seat.seatNumber} - ${typeName}`;

            if (sa.status === 'AVAILABLE') {
                seatDiv.addEventListener('click', () => toggleSeat(seatDiv));
            }

            rowDiv.appendChild(seatDiv);
        });

        seatMapContainer.appendChild(rowDiv);
    });

    // Selection logic
    let selectedSeats = [];
    let totalPrice = 0;

    function toggleSeat(seatEl) {
        const id = seatEl.dataset.id;
        const label = seatEl.dataset.label;
        const surcharge = parseFloat(seatEl.dataset.surcharge);
        const typeName = seatEl.dataset.typeName;
        const typeClass = seatEl.dataset.typeClass;

        if (seatEl.classList.contains('SELECTED')) {
            // Deselect
            seatEl.classList.remove('SELECTED');
            seatEl.classList.add('AVAILABLE', typeClass);
            selectedSeats = selectedSeats.filter(s => s.id !== id);
            totalPrice -= (basePrice + surcharge);
        } else {
            // Select
            seatEl.classList.remove('AVAILABLE', typeClass);
            seatEl.classList.add('SELECTED');
            selectedSeats.push({ id, label, typeName, surcharge });
            totalPrice += (basePrice + surcharge);
        }

        updateSummary();
    }

    function updateSummary() {
        const displayLabel = selectedSeats.map(s => s.label).join(', ');
        document.getElementById('selected-seats-display').innerText = displayLabel || '-';
        document.getElementById('total-price-display').innerText = new Intl.NumberFormat('vi-VN').format(totalPrice) + ' VNĐ';

        // Chi tiết từng ghế: loại ghế + giá
        const detailList = document.getElementById('seat-detail-list');
        detailList.innerHTML = '';
        selectedSeats.forEach(s => {
            const price = basePrice + s.surcharge;
            const div = document.createElement('div');
            div.className = 'flex justify-between text-xs text-slate-500 pl-2 border-l-2 border-blue-200';
            div.innerHTML = `<span>${s.label} <span class="font-semibold text-slate-700">(${s.typeName})</span></span><span class="font-medium">${new Intl.NumberFormat('vi-VN').format(price)} VNĐ</span>`;
            detailList.appendChild(div);
        });

        const seatIdsInput = document.getElementById('seat-ids-input');
        seatIdsInput.value = selectedSeats.map(s => s.id).join(',');

        const btn = document.getElementById('continue-btn');
        btn.disabled = selectedSeats.length === 0;
    }
</script>

</body>
</html>
