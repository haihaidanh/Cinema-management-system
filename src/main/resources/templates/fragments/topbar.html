<nav th:fragment="topbar" class="fixed top-0 left-0 right-0 bg-white border-b border-slate-200 z-50">

            <!-- Left: Logo & Brand -->
            <div class="flex items-center gap-8">
                <a th:href="@{/home}" class="flex items-center gap-2 group">
                    <div class="bg-[#004692] p-1.5 rounded-lg text-white shadow-lg shadow-blue-900/20">
                        <span class="material-symbols-outlined block">movie</span>
                    </div>
                    <span class="text-xl font-black font-headline tracking-tight text-[#004692] uppercase">

            </div>

            <div class="flex items-center gap-3">

                <!-- TRƯỜNG HỢP 1: CHƯA ĐĂNG NHẬP (currentUser == null) -->
                <th:block th:if="${session.currentUser == null}">
                    <a th:href="@{/auth/login}" class="text-sm font-bold text-slate-600 hover:text-[#004692] px-3 py-2 transition-colors">

                    </a>
                    <a href="#" class="bg-[#004692] hover:bg-[#00356d] text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-all shadow-md shadow-blue-900/10">

                    </a>

                        <div class="text-right hidden sm:block">
