<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Cinema System</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-headline {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f4faff] text-[#111d23] flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-[440px] bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- Header Màn hình Login -->
    <div class="bg-[#004692] p-8 text-center text-white">
        <h1 class="text-3xl font-black font-headline tracking-tight">WELCOME BACK</h1>
        <p class="text-blue-100 mt-2 text-sm">Please enter your details to sign in</p>
    </div>

    <div class="p-8">
        <!-- Hiển thị lỗi nếu đăng nhập thất bại -->
        <div th:if="${param.error}" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-center gap-3 text-red-700 text-sm">
            <span class="material-symbols-outlined">error</span>
            <span>Invalid username or password.</span>
        </div>

        <!-- Form Đăng nhập -->
        <form th:action="@{/auth/login}" method="post" class="space-y-5">

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700 ml-1">Username</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                    <input type="email"
                           name="email"
                           required
                           placeholder="Enter your username"
                           class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:border-[#004692] focus:ring-2 focus:ring-[#004692]/20 transition-all text-sm"/>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-sm font-bold text-slate-700">Password</label>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                    <input type="password"
                           name="password"
                           required
                           placeholder="••••••••"
                           class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:border-[#004692] focus:ring-2 focus:ring-[#004692]/20 transition-all text-sm"/>
                </div>
            </div>

            <div class="flex items-center justify-between py-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" name="remember-me" class="rounded border-slate-300 text-[#004692] focus:ring-[#004692]"/>
                    <span class="text-xs text-slate-600 group-hover:text-slate-900 transition-colors">Remember me</span>
                </label>
                <a href="#" class="text-xs font-semibold text-[#004692] hover:underline">Forgot password?</a>
            </div>

            <button type="submit"
                    class="w-full bg-[#004692] hover:bg-[#00356d] text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2 mt-4">
                <span>Sign In</span>
                <span class="material-symbols-outlined text-sm">login</span>
            </button>

        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-500">
                Don't have an account?
                <a href="#" class="text-[#004692] font-bold hover:underline">Register now</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
