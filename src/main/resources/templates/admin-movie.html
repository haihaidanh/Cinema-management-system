<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Admin - Quản lý Phim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style> body { font-family: 'Inter', sans-serif; } .font-headline { font-family: 'Manrope', sans-serif; } </style>
</head>
<body class="bg-slate-50">

<!-- Chèn Sidebar -->
<div th:replace="~{fragments/admin_sidebar :: sidebar}"></div>

<main class="ml-64 p-8">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-black font-headline text-[#111d23]">QUẢN LÝ PHIM</h1>
            <p class="text-slate-500 mt-1">Danh sách các phim đang và sắp chiếu tại hệ thống</p>
        </div>
        <div class="flex gap-4 items-center">
            <!-- Form Tìm kiếm -->
            <form th:action="@{/admin/movies}" method="get" class="relative">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm tên phim..." 
                       class="pl-10 pr-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400">search</span>
            </form>
            <button onclick="openModal('add')" class="bg-[#004692] hover:bg-[#00356d] text-white font-bold py-2.5 px-6 rounded-xl shadow-lg shadow-blue-900/20 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined">add_circle</span>
                Thêm phim mới
            </button>
        </div>
    </div>

    <!-- Table Danh sách phim -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Poster</th>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Tên Phim</th>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Thể loại</th>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Thời lượng</th>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Năm</th>
                <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Hành động</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-sm">
            <tr th:each="m : ${movies}">
                <td class="px-6 py-4">
                    <div class="w-12 h-16 bg-slate-200 rounded-md overflow-hidden">
                        <img th:src="${m.posterUrl != null ? m.posterUrl : 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                    </div>
                </td>
                <td class="px-6 py-4 font-bold text-slate-800" th:text="${m.title}">Avengers: Endgame</td>
                <td class="px-6 py-4 text-slate-500" th:text="${m.genre}">Action, Sci-fi</td>
                <td class="px-6 py-4 text-slate-500" th:text="${m.duration + ' phút'}">180 phút</td>
                <td class="px-6 py-4 text-slate-500" th:text="${m.releaseYear}">2019</td>
                <td class="px-6 py-4 text-right space-x-2">
                    <button type="button"
                            th:data-id="${m.movieId}"
                            th:data-title="${m.title}"
                            th:data-genre="${m.genre}"
                            th:data-duration="${m.duration}"
                            th:data-year="${m.releaseYear}"
                            th:data-poster="${m.posterUrl}"
                            th:data-desc="${m.description}"
                            onclick="openEditModal(this)"
                            class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg transition-colors">
                        <span class="material-symbols-outlined text-sm">edit</span>
                    </button>
                    <form th:action="@{/admin/movies/delete/{id}(id=${m.movieId})}" method="post" class="inline">
                        <button type="submit" onclick="return confirm('Bạn có chắc chắn muốn xóa phim này?')" class="text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(movies)}">
                <td colspan="6" class="px-6 py-10 text-center text-slate-500 italic">Không tìm thấy bộ phim nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Modal Thêm/Sửa Phim -->
<div id="movieModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
        <div class="bg-[#004692] p-6 text-white flex justify-between items-center">
            <h2 id="modalTitle" class="text-xl font-bold font-headline">THÊM PHIM MỚI</h2>
            <button onclick="closeModal()" class="material-symbols-outlined hover:text-slate-300">close</button>
        </div>
        <form id="movieForm" method="post" th:action="@{/admin/movies}" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tên phim</label>
                    <input type="text" name="title" id="m_title" required class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Thể loại</label>
                    <input type="text" name="genre" id="m_genre" class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Thời lượng (phút)</label>
                    <input type="number" name="duration" id="m_duration" required class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Năm sản xuất</label>
                    <input type="number" name="releaseYear" id="m_releaseYear" required class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">URL Poster</label>
                    <input type="text" name="posterUrl" id="m_posterUrl" class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mô tả</label>
                    <textarea name="description" id="m_description" rows="3" class="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="closeModal()" class="px-6 py-2 border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50">Hủy</button>
                <button type="submit" class="px-6 py-2 bg-[#004692] text-white rounded-xl font-bold hover:bg-[#00356d] shadow-lg shadow-blue-900/20">Lưu lại</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const modal = document.getElementById('movieModal');
    const form = document.getElementById('movieForm');
    const title = document.getElementById('modalTitle');

    function openModal(mode) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        if (mode === 'add') {
            title.innerText = 'THÊM PHIM MỚI';
            form.action = '/admin/movies';
            form.reset();
        }
    }

    function openEditModal(btn) {
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        title.innerText = 'CHỈNH SỬA PHIM';
        
        const id = btn.getAttribute('data-id');
        form.action = '/admin/movies/update/' + id;
        
        document.getElementById('m_title').value = btn.getAttribute('data-title');
        document.getElementById('m_genre').value = btn.getAttribute('data-genre');
        document.getElementById('m_duration').value = btn.getAttribute('data-duration');
        document.getElementById('m_releaseYear').value = btn.getAttribute('data-year');
        document.getElementById('m_posterUrl').value = btn.getAttribute('data-poster');
        document.getElementById('m_description').value = btn.getAttribute('data-desc');
    }

    function closeModal() {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }
</script>
</body>
</html>
