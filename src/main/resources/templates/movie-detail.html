<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${movie.title} + ' - Cinema System'">Movie Detail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>

<body class="bg-[#f4faff] text-[#111d23]">

<!-- CHÈN TOPBAR Ở ĐÂY -->
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="pt-24 p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col md:flex-row">
        <!-- Poster -->
        <div class="w-full md:w-1/3">
            <img th:src="${movie.posterUrl != null ? movie.posterUrl : 'https://via.placeholder.com/400x600?text=No+Poster'}" 
                 alt="Movie Poster" class="w-full h-full object-cover">
        </div>
        
        <!-- Info -->
        <div class="w-full md:w-2/3 p-8 flex flex-col justify-between">
            <div>
                <a href="/" class="inline-flex items-center gap-2 text-slate-500 hover:text-[#004692] mb-4 font-bold transition">
                    <span class="material-symbols-outlined text-sm">arrow_back_ios</span> Về trang chủ
                </a>
                <h1 class="text-3xl font-black font-headline text-[#004692] mb-2" th:text="${movie.title}">Movie Title</h1>
                <div class="flex items-center gap-4 text-sm text-slate-500 mb-6">
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium" th:text="${movie.genre}">Genre</span>
                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">calendar_today</span> <span th:text="${movie.releaseYear}">2023</span></span>
                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">schedule</span> <span th:text="${movie.duration + ' phút'}">120 phút</span></span>
                </div>
                
                <h3 class="font-bold text-lg mb-2 border-b pb-2">Nội dung phim</h3>
                <p class="text-slate-600 leading-relaxed mb-8" th:text="${movie.description}">
                    Mô tả chi tiết nội dung bộ phim sẽ được hiển thị ở đây.
                </p>
            </div>
            
            <div>
                <a th:href="@{/movies/{id}/showtimes(id=${movie.movieId})}" 
                   class="inline-block bg-[#004692] text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 transition text-lg shadow-md hover:shadow-lg">
                    Đặt vé ngay
                </a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
